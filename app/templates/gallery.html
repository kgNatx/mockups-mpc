<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Mockups MPC</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <div class="shell">

    <!-- ===== SIDEBAR ===== -->
    <aside class="sidebar">
      <div class="sidebar-brand">
        <h1>Mockups MPC</h1>
        <div class="brand-sub-row">
          <div class="brand-sub">Design Artifacts</div>
          <a class="brand-guide-link" id="guide-link" href="#" style="display:none">Setup Guide</a>
        </div>
      </div>

      <div class="sidebar-projects">
        <div class="section-label">Projects</div>
        <ul class="project-list" id="project-list"></ul>
      </div>

      <div class="sidebar-filter">
        <div class="search-wrap">
          <svg class="search-icon" viewBox="0 0 24 24"><circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.5" y2="16.5"/></svg>
          <input
            type="text" class="filter-input" id="filter-input"
            placeholder="Search title, description, tags…"
            autocomplete="off" spellcheck="false"
          >
        </div>
        <div class="sort-seg" id="sort-seg">
          <div class="sort-opt active" data-sort="newest">Newest</div>
          <div class="sort-opt" data-sort="oldest">Oldest</div>
          <div class="sort-opt fav-sort" data-sort="favorites">★ First</div>
        </div>
      </div>

      <div class="sidebar-feed" id="feed-container">
        <div class="feed-status" id="feed-status">Loading...</div>
      </div>
    </aside>

    <!-- ===== MAIN VIEWER ===== -->
    <main class="main">
      <div class="meta-bar empty" id="meta-bar">
        <span class="meta-hint">Select a mockup to preview</span>
      </div>
      <div class="viewer" id="viewer">
        <div class="viewer-empty">
          <div class="viewer-empty-icon">
            <svg viewBox="0 0 24 24">
              <rect x="3" y="3" width="18" height="18" rx="2" />
              <line x1="3" y1="9" x2="21" y2="9" />
              <line x1="9" y1="3" x2="9" y2="9" />
            </svg>
          </div>
          <div class="viewer-empty-text">No mockup selected</div>
        </div>
      </div>
    </main>

  </div>

<script>
(function () {
  "use strict";

  /* ── State ── */
  var FAVORITES = "__favorites__";   // sentinel for state.activeProject

  var state = {
    projects: [],
    mockups: [],
    activeProject: null,   // null = all, FAVORITES = favorites filter, else a project slug
    activeMockupId: null,
    filterText: "",
    sort: "newest",
    favoritesCount: 0,
    offset: 0,
    limit: 50,
    loading: false,
    exhausted: false
  };

  /* ── DOM refs ── */
  var projectListEl  = document.getElementById("project-list");
  var feedContainer   = document.getElementById("feed-container");
  var feedStatusEl    = document.getElementById("feed-status");
  var filterInput     = document.getElementById("filter-input");
  var metaBar         = document.getElementById("meta-bar");
  var viewer          = document.getElementById("viewer");

  /* ── Helpers ── */
  function el(tag, cls, attrs) {
    var node = document.createElement(tag);
    if (cls) node.className = cls;
    if (attrs) {
      Object.keys(attrs).forEach(function (k) {
        node.setAttribute(k, attrs[k]);
      });
    }
    return node;
  }

  function text(str) { return document.createTextNode(str); }

  function clearChildren(node) {
    while (node.firstChild) node.removeChild(node.firstChild);
  }

  function formatTime(iso) {
    var d = new Date(iso);
    var now = new Date();
    var diff = now - d;
    if (diff < 60000) return "just now";
    if (diff < 3600000) return Math.floor(diff / 60000) + "m ago";
    if (diff < 86400000) return Math.floor(diff / 3600000) + "h ago";
    if (diff < 604800000) return Math.floor(diff / 86400000) + "d ago";
    var month = d.toLocaleString("en", { month: "short" });
    return month + " " + d.getDate();
  }

  function dateKey(iso) {
    var d = new Date(iso);
    return d.getFullYear() + "-" + String(d.getMonth() + 1).padStart(2, "0") + "-" + String(d.getDate()).padStart(2, "0");
  }

  function formatDateLabel(iso) {
    var d = new Date(iso);
    var now = new Date();
    var today = new Date(now.getFullYear(), now.getMonth(), now.getDate());
    var target = new Date(d.getFullYear(), d.getMonth(), d.getDate());
    var diff = today - target;

    if (diff === 0) return "Today";
    if (diff === 86400000) return "Yesterday";
    if (diff < 604800000) return d.toLocaleString("en", { weekday: "long" });
    var month = d.toLocaleString("en", { month: "short" });
    if (d.getFullYear() === now.getFullYear()) return month + " " + d.getDate();
    return month + " " + d.getDate() + ", " + d.getFullYear();
  }

  /* ── Projects ── */
  async function loadProjects() {
    var resp = await fetch("/api/projects");
    state.projects = await resp.json();
    renderProjects();
  }

  async function loadFavoritesCount() {
    try {
      var resp = await fetch("/api/favorites/count");
      var data = await resp.json();
      state.favoritesCount = data.count || 0;
    } catch (e) { /* leave previous value */ }
  }

  function renderProjects() {
    clearChildren(projectListEl);

    // Favorites pseudo-item
    var favItem = el("li", "project-item favorites" + (state.activeProject === FAVORITES ? " active" : ""));
    favItem.addEventListener("click", function () { selectProject(FAVORITES); });
    var favName = el("span", "project-name");
    var favStar = el("span", "fav-star");
    favStar.appendChild(text("★"));
    favName.appendChild(favStar);
    favName.appendChild(text("Favorites"));
    var favCount = el("span", "project-count");
    favCount.appendChild(text(String(state.favoritesCount || 0)));
    favItem.appendChild(favName);
    favItem.appendChild(favCount);
    projectListEl.appendChild(favItem);

    // "All" item
    var allItem = el("li", "project-item" + (state.activeProject === null ? " active" : ""));
    allItem.addEventListener("click", function () { selectProject(null); });
    var allName = el("span", "project-name");
    allName.appendChild(text("All"));
    var allCount = el("span", "project-count");
    var total = state.projects.reduce(function (s, p) { return s + p.count; }, 0);
    allCount.appendChild(text(String(total)));
    allItem.appendChild(allName);
    allItem.appendChild(allCount);
    projectListEl.appendChild(allItem);

    projectListEl.appendChild(el("div", "project-divider"));

    state.projects.forEach(function (proj) {
      var item = el("li", "project-item" + (state.activeProject === proj.project_slug ? " active" : ""));
      item.addEventListener("click", function () { selectProject(proj.project_slug); });
      var name = el("span", "project-name");
      name.appendChild(text(proj.project));
      var count = el("span", "project-count");
      count.appendChild(text(String(proj.count)));
      item.appendChild(name);
      item.appendChild(count);
      projectListEl.appendChild(item);
    });
  }

  function selectProject(slug) {
    state.activeProject = slug;
    state.offset = 0;
    state.exhausted = false;
    state.mockups = [];
    renderProjects();
    loadMockups(true);
  }

  /* ── Mockups Feed ── */
  async function loadMockups(reset) {
    if (state.loading) return;
    if (!reset && state.exhausted) return;

    state.loading = true;

    if (reset) {
      state.offset = 0;
      state.exhausted = false;
      state.mockups = [];
      // clear feed but keep container
      var items = feedContainer.querySelectorAll(".feed-item, .feed-date, .feed-loader");
      items.forEach(function (el) { el.remove(); });
      feedStatusEl.textContent = "Loading...";
      feedStatusEl.style.display = "";
    }

    var url = "/api/mockups?limit=" + state.limit + "&offset=" + state.offset
            + "&sort=" + encodeURIComponent(state.sort);
    if (state.activeProject === FAVORITES) {
      url += "&favorites_only=true";
    } else if (state.activeProject) {
      url += "&project=" + encodeURIComponent(state.activeProject);
    }
    if (state.filterText) {
      url += "&q=" + encodeURIComponent(state.filterText);
    }

    var resp = await fetch(url);
    var data = await resp.json();

    if (data.length < state.limit) state.exhausted = true;
    state.offset += data.length;

    if (reset) state.mockups = data;
    else state.mockups = state.mockups.concat(data);

    state.loading = false;
    renderFeed(reset);
  }

  function renderFeed(isReset) {
    feedStatusEl.style.display = "none";

    // Remove existing loader
    var oldLoader = feedContainer.querySelector(".feed-loader");
    if (oldLoader) oldLoader.remove();

    if (state.mockups.length === 0) {
      feedStatusEl.textContent = "No mockups yet";
      feedStatusEl.style.display = "";
      return;
    }

    var filtered = state.mockups;

    // Always clear and re-render with date separators
    var oldItems = feedContainer.querySelectorAll(".feed-item, .feed-date");
    oldItems.forEach(function (node) { node.remove(); });

    if (filtered.length === 0) {
      feedStatusEl.textContent = "No matches";
      feedStatusEl.style.display = "";
      return;
    }

    var lastDate = null;
    filtered.forEach(function (mockup) {
      var dk = dateKey(mockup.created_at);
      if (dk !== lastDate) {
        lastDate = dk;
        var sep = el("div", "feed-date");
        sep.appendChild(text(formatDateLabel(mockup.created_at)));
        feedContainer.appendChild(sep);
      }
      feedContainer.appendChild(createFeedItem(mockup));
    });
  }

  function createFeedItem(mockup) {
    var item = el("div", "feed-item" + (mockup.id === state.activeMockupId ? " active" : ""));
    item.setAttribute("data-id", mockup.id);
    if (mockup.favorite) item.classList.add("has-fav");

    var star = el("button", "feed-star" + (mockup.favorite ? " starred" : ""),
                  { title: mockup.favorite ? "Unfavorite" : "Favorite", type: "button" });
    star.appendChild(text(mockup.favorite ? "★" : "☆"));
    star.addEventListener("click", function (e) {
      e.stopPropagation();
      toggleFavorite(mockup, star, item);
    });
    item.appendChild(star);

    item.addEventListener("click", function () {
      if (state.activeMockupId === mockup.id) deselectMockup();
      else selectMockup(mockup.id);
    });

    var title = el("div", "feed-title");
    var titleText = el("span", "feed-title-text");
    titleText.appendChild(text(mockup.title));
    title.appendChild(titleText);
    title.addEventListener("mouseenter", function () {
      var overflow = titleText.offsetWidth - title.clientWidth;
      if (overflow > 0) {
        var dur = Math.max(2, overflow / 30);
        title.style.setProperty("--scroll-dist", -(overflow + 8) + "px");
        title.style.setProperty("--scroll-dur", dur + "s");
        title.classList.add("scrolling");
      }
    });
    title.addEventListener("mouseleave", function () {
      title.classList.remove("scrolling");
    });
    item.appendChild(title);

    var actions = el("div", "feed-actions");

    var copyBtn = el("button", "feed-action-btn feed-action-copy", { title: "Copy link", type: "button" });
    copyBtn.appendChild(text("\u{1F517}"));
    copyBtn.addEventListener("click", function (e) {
      e.stopPropagation();
      var galleryUrl = window.location.origin + "/?mockup=" + encodeURIComponent(mockup.id);
      copyToClipboard(galleryUrl).then(function (ok) {
        copyBtn.textContent = ok ? "\u2713" : "\u2717";
        copyBtn.classList.add(ok ? "copied" : "failed");
        setTimeout(function () {
          copyBtn.textContent = "\u{1F517}";
          copyBtn.classList.remove("copied", "failed");
        }, 1500);
      });
    });
    actions.appendChild(copyBtn);

    var delBtn = el("button", "feed-action-btn feed-action-delete", { title: "Delete", type: "button" });
    delBtn.appendChild(text("\u2715"));
    delBtn.addEventListener("click", function (e) {
      e.stopPropagation();
      deleteMockup(mockup.id);
    });
    actions.appendChild(delBtn);

    item.appendChild(actions);

    var meta = el("div", "feed-meta");

    var badge = el("span", "feed-badge");
    badge.appendChild(text(mockup.project));
    meta.appendChild(badge);

    var typeEl = el("span", "feed-type");
    typeEl.setAttribute("data-type", mockup.content_type);
    typeEl.appendChild(text(mockup.content_type));
    meta.appendChild(typeEl);

    var time = el("span", "feed-time");
    time.appendChild(text(formatTime(mockup.created_at)));
    meta.appendChild(time);

    item.appendChild(meta);
    return item;
  }

  /* ── Deselect ── */
  function deselectMockup() {
    state.activeMockupId = null;
    var url = new URL(window.location);
    url.searchParams.delete("mockup");
    history.replaceState(null, "", url);

    feedContainer.querySelectorAll(".feed-item").forEach(function (el) {
      el.classList.remove("active");
    });

    clearChildren(viewer);
    viewer.appendChild(createEmptyViewer());
    clearChildren(metaBar);
    metaBar.classList.add("empty");
    var hint = el("span", "meta-hint");
    hint.appendChild(text("Select a mockup to preview"));
    metaBar.appendChild(hint);
  }

  /* ── Clipboard ── */
  function copyToClipboard(str) {
    if (navigator.clipboard && navigator.clipboard.writeText) {
      return navigator.clipboard.writeText(str).then(function () { return true; }).catch(function () { return fallbackCopy(str); });
    }
    return Promise.resolve(fallbackCopy(str));
  }

  function fallbackCopy(str) {
    var ta = document.createElement("textarea");
    ta.value = str;
    ta.style.cssText = "position:fixed;left:-9999px;top:-9999px;opacity:0";
    document.body.appendChild(ta);
    ta.select();
    var ok = false;
    try { ok = document.execCommand("copy"); } catch (e) { ok = false; }
    document.body.removeChild(ta);
    return ok;
  }

  /* ── Delete ── */
  async function toggleFavorite(mockup, starEl, itemEl) {
    var next = !mockup.favorite;
    // optimistic UI
    applyFavoriteUI(mockup, starEl, itemEl, next);
    try {
      var resp = await fetch("/api/mockups/" + encodeURIComponent(mockup.id) + "/favorite", {
        method: "PUT",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ favorite: next })
      });
      if (!resp.ok) throw new Error("request failed");
      await loadFavoritesCount();
      renderProjects();
      // If we're viewing the favorites filter and just unfavorited, drop it from the feed
      if (state.activeProject === FAVORITES && !next) {
        state.mockups = state.mockups.filter(function (m) { return m.id !== mockup.id; });
        renderFeed(true);
      }
      // keep meta-bar star in sync if this is the open mockup
      if (state.activeMockupId === mockup.id) renderMetaBar(mockup);
    } catch (e) {
      // rollback
      applyFavoriteUI(mockup, starEl, itemEl, !next);
    }
  }

  function applyFavoriteUI(mockup, starEl, itemEl, value) {
    mockup.favorite = value;
    starEl.textContent = value ? "★" : "☆";
    starEl.title = value ? "Unfavorite" : "Favorite";
    starEl.classList.toggle("starred", value);
    if (itemEl) itemEl.classList.toggle("has-fav", value);
  }

  async function deleteMockup(id) {
    var resp = await fetch("/api/mockups/" + encodeURIComponent(id), { method: "DELETE" });
    if (!resp.ok) return;

    // Remove from state
    state.mockups = state.mockups.filter(function (m) { return m.id !== id; });

    // If we deleted the active mockup, clear the viewer
    if (state.activeMockupId === id) {
      state.activeMockupId = null;
      clearChildren(viewer);
      viewer.appendChild(createEmptyViewer());
      clearChildren(metaBar);
      metaBar.classList.add("empty");
      var hint = el("span", "meta-hint");
      hint.appendChild(text("Select a mockup to preview"));
      metaBar.appendChild(hint);
    }

    renderFeed(true);
    loadProjects();
    loadFavoritesCount().then(renderProjects);
  }

  function createEmptyViewer() {
    var wrap = el("div", "viewer-empty");
    var icon = el("div", "viewer-empty-icon");
    icon.insertAdjacentHTML("afterbegin", '<svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="9" y1="3" x2="9" y2="9"/></svg>');
    wrap.appendChild(icon);
    var txt = el("div", "viewer-empty-text");
    txt.appendChild(text("No mockup selected"));
    wrap.appendChild(txt);
    return wrap;
  }

  /* ── Mockup Selection ── */
  function selectMockup(id) {
    state.activeMockupId = id;

    // Update URL
    var url = new URL(window.location);
    url.searchParams.set("mockup", id);
    history.replaceState(null, "", url);

    // Update feed active state
    feedContainer.querySelectorAll(".feed-item").forEach(function (el) {
      if (el.getAttribute("data-id") === id) el.classList.add("active");
      else el.classList.remove("active");
    });

    // Find mockup data
    var mockup = state.mockups.find(function (m) { return m.id === id; });
    if (!mockup) {
      // Need to fetch it
      fetchAndDisplay(id);
      return;
    }

    renderViewer(mockup);
    renderMetaBar(mockup);
  }

  async function fetchAndDisplay(id) {
    var resp = await fetch("/api/mockups/" + encodeURIComponent(id));
    if (!resp.ok) return;
    var mockup = await resp.json();
    renderViewer(mockup);
    renderMetaBar(mockup);
  }

  function renderMetaBar(mockup) {
    clearChildren(metaBar);
    metaBar.classList.remove("empty");

    if (mockup.favorite) {
      var metaStar = el("span", "meta-star");
      metaStar.appendChild(text("★"));
      metaBar.appendChild(metaStar);
    }

    var title = el("span", "meta-title");
    title.appendChild(text(mockup.title));
    metaBar.appendChild(title);

    if (mockup.description) {
      metaBar.appendChild(el("span", "meta-sep"));
      var desc = el("span", "meta-desc");
      desc.appendChild(text(mockup.description));
      metaBar.appendChild(desc);
    }

    if (mockup.tags && mockup.tags.length > 0) {
      metaBar.appendChild(el("span", "meta-sep"));
      var tagsWrap = el("span", "meta-tags");
      mockup.tags.forEach(function (t) {
        var tag = el("span", "meta-tag");
        tag.appendChild(text(t));
        tagsWrap.appendChild(tag);
      });
      metaBar.appendChild(tagsWrap);
    }

    metaBar.appendChild(el("span", "meta-sep"));

    var proj = el("span", "meta-project");
    proj.appendChild(text(mockup.project));
    metaBar.appendChild(proj);

    metaBar.appendChild(el("span", "meta-sep"));

    var time = el("span", "meta-time");
    time.appendChild(text(formatTime(mockup.created_at)));
    metaBar.appendChild(time);

    // spacer
    var spacer = el("span", "");
    spacer.style.flex = "1";
    metaBar.appendChild(spacer);

    if (mockup.content_type === "html") {
      var vpSeg = el("div", "viewport-seg");
      [["mobile", "375"], ["tablet", "768"], ["desktop", "Full"]].forEach(function (pair) {
        var opt = el("div", "vp-opt" + (pair[0] === "desktop" ? " active" : ""), { "data-vp": pair[0] });
        opt.appendChild(text(pair[1]));
        opt.addEventListener("click", function () { setViewport(pair[0], vpSeg); });
        vpSeg.appendChild(opt);
      });
      metaBar.appendChild(vpSeg);

      var fsBtn = el("button", "meta-icon-btn", { title: "Fullscreen", type: "button" });
      fsBtn.insertAdjacentHTML("afterbegin", '<svg viewBox="0 0 24 24"><path d="M4 9V4h5M20 9V4h-5M4 15v5h5M20 15v5h-5"/></svg>');
      fsBtn.addEventListener("click", function () {
        if (viewer.requestFullscreen) viewer.requestFullscreen();
      });
      metaBar.appendChild(fsBtn);
    }

    var popout = el("a", "meta-popout", {
      href: "/view/" + encodeURIComponent(mockup.id),
      target: "_blank", rel: "noopener"
    });
    popout.appendChild(text("Pop out"));
    metaBar.appendChild(popout);
  }

  function setViewport(size, segEl) {
    segEl.querySelectorAll(".vp-opt").forEach(function (o) {
      o.classList.toggle("active", o.getAttribute("data-vp") === size);
    });
    viewer.classList.remove("vp-mobile", "vp-tablet");
    if (size === "mobile") viewer.classList.add("vp-mobile");
    else if (size === "tablet") viewer.classList.add("vp-tablet");
  }

  function renderViewer(mockup) {
    clearChildren(viewer);
    viewer.classList.remove("vp-mobile", "vp-tablet");

    var viewUrl = "/view/" + encodeURIComponent(mockup.id);

    if (mockup.content_type === "html") {
      var iframe = el("iframe", "viewer-iframe", {
        sandbox: "allow-scripts",
        src: viewUrl
      });
      viewer.appendChild(iframe);
    } else {
      // image types: png, jpg, svg
      var img = el("img", "viewer-image", {
        src: viewUrl,
        alt: mockup.title
      });
      viewer.appendChild(img);
    }
  }

  /* ── Filter Input ── */
  var filterTimer = null;
  filterInput.addEventListener("input", function () {
    clearTimeout(filterTimer);
    filterTimer = setTimeout(function () {
      state.filterText = filterInput.value.trim();
      loadMockups(true);
    }, 200);
  });

  /* ── Sort Control ── */
  var sortSeg = document.getElementById("sort-seg");
  sortSeg.addEventListener("click", function (e) {
    var opt = e.target.closest(".sort-opt");
    if (!opt) return;
    sortSeg.querySelectorAll(".sort-opt").forEach(function (o) { o.classList.remove("active"); });
    opt.classList.add("active");
    state.sort = opt.getAttribute("data-sort");
    loadMockups(true);
  });

  /* ── Infinite Scroll ── */
  feedContainer.addEventListener("scroll", function () {
    if (state.loading || state.exhausted) return;
    var threshold = feedContainer.scrollHeight - feedContainer.scrollTop - feedContainer.clientHeight;
    if (threshold < 120) {
      loadMockups(false);
    }
  });

  /* ── Direct Link Support ── */
  function getInitialMockupId() {
    var params = new URLSearchParams(window.location.search);
    return params.get("mockup") || null;
  }

  /* ── Setup Guide Link ── */
  function updateGuideLink() {
    var guide = state.mockups.find(function (m) { return m.title === "Setup Guide"; });
    var link = document.getElementById("guide-link");
    if (guide && link) {
      link.href = "#";
      link.style.display = "";
      link.addEventListener("click", function (e) {
        e.preventDefault();
        selectMockup(guide.id);
      });
    }
  }

  /* ── Auto-refresh ── */
  var POLL_INTERVAL = 5000;

  async function pollForUpdates() {
    try {
      var url = "/api/mockups?limit=1";
      if (state.activeProject) url += "&project=" + encodeURIComponent(state.activeProject);
      var resp = await fetch(url);
      var data = await resp.json();
      if (data.length === 0 && state.mockups.length === 0) return;

      // Check if the newest item changed or count differs
      var latestId = data.length > 0 ? data[0].id : null;
      var currentId = state.mockups.length > 0 ? state.mockups[0].id : null;
      if (latestId !== currentId) {
        await loadProjects();
        await loadMockups(true);
        updateGuideLink();
      }
    } catch (e) {
      // silently skip on network errors
    }
  }

  setInterval(pollForUpdates, POLL_INTERVAL);

  /* ── Init ── */
  async function init() {
    await loadProjects();
    await loadFavoritesCount();
    renderProjects();
    await loadMockups(true);
    updateGuideLink();

    var initialId = getInitialMockupId();
    if (initialId) {
      selectMockup(initialId);
    } else if (state.mockups.length > 0) {
      // Auto-select most recent
      selectMockup(state.mockups[0].id);
    }
  }

  init();
})();
</script>
</body>
